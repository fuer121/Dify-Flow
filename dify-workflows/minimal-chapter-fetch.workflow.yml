    - data:
        code: |
          def main(book_id: int, start_chapter: int, end_chapter: int):
              try:
                  book_id = int(book_id)
                  start = int(start_chapter)
                  end = int(end_chapter)
              except Exception:
                  return {
                      "chapter_numbers": [],
                      "range_status": "error: book_id、start_chapter、end_chapter 必须是数字",
                  }

              if book_id <= 0:
                  return {
                      "chapter_numbers": [],
                      "range_status": "error: book_id 必须大于 0",
                  }

              if start <= 0 or end <= 0:
                  return {
                      "chapter_numbers": [],
                      "range_status": "error: 章节号必须大于 0",
                  }

              if end < start:
                  end = start

              total = end - start + 1
              if total > 100:
                  return {
                      "chapter_numbers": [],
                      "range_status": "error: 单次最多 100 章，请由本地服务分批调用",
                  }

              return {
                  "chapter_numbers": list(range(start, end + 1)),
                  "range_status": "ok",
              }
        code_language: python3
        outputs:
          chapter_numbers:
            children: 
            type: array[number]
          range_status:
            children: 
            type: string
