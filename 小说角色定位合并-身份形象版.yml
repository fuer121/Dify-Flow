    - data:
        code: "def main(text: str, current_chapter: int):\n    import json\n    import\
          \ re\n\n    raw = (text or \"\").strip()\n    raw = re.sub(r\"^```(?:json)?\"\
          , \"\", raw).strip()\n    raw = re.sub(r\"```$\", \"\", raw).strip()\n\n\
          \    try:\n        data = json.loads(raw)\n    except Exception:\n     \
          \   data = {\n            \"chapter_index\": int(current_chapter),\n   \
          \         \"chapter_title\": \"\",\n            \"roles\": [],\n       \
          \     \"parse_error\": True,\n            \"raw_text\": raw[:1000],\n  \
          \      }\n\n    if not isinstance(data, dict):\n        data = {\n     \
          \       \"chapter_index\": int(current_chapter),\n            \"chapter_title\"\
          : \"\",\n            \"roles\": [],\n        }\n\n    if not isinstance(data.get(\"\
          roles\"), list):\n        data[\"roles\"] = []\n\n    return {\n       \
          \ \"chapter_result\": json.dumps(data, ensure_ascii=False),\n    }\n"
        code_language: python3
        isInIteration: true
        isInLoop: false
        iteration_id: '2000000000003'
