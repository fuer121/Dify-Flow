    - data:
        code: |
          def main(book_id: int, start_chapter: int, end_chapter: int, range_status: str, items: list):
              import json

              chapters = []
              for item in items or []:
                  try:
                      parsed = json.loads(item) if isinstance(item, str) else item
                  except Exception:
                      continue
                  if isinstance(parsed, dict):
                      chapters.append(parsed)

              result = {
                  "book_id": int(book_id),
                  "start_chapter_index": int(start_chapter),
                  "end_chapter_index": int(end_chapter),
                  "range_status": range_status,
                  "chapters": chapters,
              }

              return {
                  "result": json.dumps(result, ensure_ascii=False),
              }
