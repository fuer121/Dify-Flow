    - data:
        code: |-
          def main(text: str, current_chapter: int):
              import json
              import re

              raw = (text or "").strip()
              raw = re.sub(r"^```(?:json)?", "", raw).strip()
              raw = re.sub(r"```$", "", raw).strip()

              try:
                  data = json.loads(raw)
              except Exception:
                  data = {
                      "chapter_index": int(current_chapter),
                      "chapter_title": "",
                      "target_character": "宁姚",
                      "weapons": [],
                      "parse_error": True,
                      "raw_text": raw[:1000],
                  }

              if not isinstance(data, dict):
                  data = {
                      "chapter_index": int(current_chapter),
                      "chapter_title": "",
                      "target_character": "宁姚",
                      "weapons": [],
                  }

              data["chapter_index"] = data.get("chapter_index") or int(current_chapter)
              data["target_character"] = data.get("target_character") or "宁姚"

              if not isinstance(data.get("weapons"), list):
                  data["weapons"] = []

              return {
                  "chapter_result": json.dumps(data, ensure_ascii=False),
              }
        code_language: python3
        isInIteration: true
        isInLoop: false
