    - data:
        code: |-
          def main(text: str, range_status: str):
              import json
              import re

              if range_status != "ok":
                  return {"result": range_status}

              raw = (text or "").strip()
              raw = re.sub(r"^```(?:json)?", "", raw).strip()
              raw = re.sub(r"```$", "", raw).strip()

              try:
                  data = json.loads(raw)
              except Exception:
                  return {"result": raw}

              if not isinstance(data, list):
                  return {"result": json.dumps(data, ensure_ascii=False, indent=2)}

              def as_list(value):
                  if value is None or value == "":
                      return []
                  if isinstance(value, list):
                      return value
                  return [value]

              def normalize_evidence(value):
                  evidence = as_list(value)
                  normalized = []
                  for item in evidence[:5]:
                      if isinstance(item, dict):
                          normalized.append({
                              "text": item.get("text") or item.get("依据") or "",
                              "reason": item.get("reason") or item.get("理由") or "",
                          })
                      else:
                          normalized.append({"text": str(item), "reason": ""})
                  return normalized

              result = []
              for item in data:
                  if not isinstance(item, dict):
                      continue

                  evidence = item.get("判断依据") or item.get("evidence") or []
                  keywords = item.get("设计关键词") or item.get("design_keywords") or []
                  unknowns = item.get("信息缺口") or item.get("unknown_fields") or []
                  aliases = item.get("别名") or item.get("aliases") or []

                  result.append({
                      "武器名称": item.get("武器名称") or item.get("weapon_name") or "未命名武器",
                      "别名": as_list(aliases),
                      "重要性": item.get("重要性") or item.get("importance") or "边缘武器",
                      "与宁姚关系": item.get("与宁姚关系") or item.get("relation_to_ning_yao") or "与宁姚相关但归属不明",
                      "武器类型": item.get("武器类型") or item.get("weapon_type") or "类型不明确",
                      "设定摘要": item.get("设定摘要") or item.get("setting_summary") or "原文未明确",
                      "武器形象描述": item.get("武器形象描述") or item.get("visual_description") or "外观细节不足；需结合宁姚剑修身份进行保守生成。",
                      "能力或气场": item.get("能力或气场") or item.get("ability_or_aura") or "原文未明确",
                      "设计关键词": as_list(keywords),
                      "信息缺口": as_list(unknowns),
                      "判断依据": normalize_evidence(evidence),
                  })

              rank = {"核心武器": 0, "重要武器": 1, "边缘武器": 2}
              result.sort(key=lambda x: (rank.get(x["重要性"], 9), x["武器名称"]))
              return {"result": json.dumps(result, ensure_ascii=False, indent=2)}
        code_language: python3
