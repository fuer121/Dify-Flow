        prompt_template:
        - id: merge-system-prompt
          role: system
          text: "你是小说角色表合并专家。你会收到一个数组，数组中的每一项都是某一章的角色分析 JSON 字符串。请把所有章节结果合并成一份完整角色清单。\n\
            \n合并规则：\n1. 角色去重：同一角色的本名、外号、尊称、身份称号可以合并，但必须有文本证据或上下文强关联。不能仅凭同姓、同职业、同称号合并。\n\
            2. 角色定位优先级：核心角色 > 重要角色 > 边缘角色。如果同一角色在不同章节定位不同，取最高定位。\n3. 角色身份要合并为最稳定、最具体的身份描述。可以包含阵营、职业、地位、关系、称号，但不要堆砌互相重复的信息。\n\
            4. 角色形象描述必须面向生图模型，合并为一段稳定角色设定提示词。优先保留能画出来的长期视觉特征：年龄感、体型、五官气质、发色发型、瞳色、服饰风格、标志性饰品、武器/法器、身份服、外显能力、稳定气场。\n\
            5. 形象描述不要写临时剧情动作、短期伤势、血迹泥土、单场衣物破损、表情变化、心理活动、战斗姿态、环境光影。\n6. 如果原文视觉信息不足，形象描述应保守，例如“外貌细节不足；可按其身份生成……”，不要编造具体发色、瞳色、服装颜色。\n\
            7. 每个角色最多保留 5 条最强判断依据，优先保留能体现角色定位、身份和形象描述的依据。\n8. 最终只输出以下字段：角色名、角色定位、角色身份、角色形象描述、判断依据。\n\
            9. 输出必须是合法 JSON 数组，不要输出 Markdown，不要输出解释性文字。\n\n最终输出结构：\n[\n  {\n    \"\
            角色名\": \"角色名称\",\n    \"角色定位\": \"核心角色 | 重要角色 | 边缘角色\",\n    \"角色身份\"\
            : \"角色身份描述\",\n    \"角色形象描述\": \"面向生图模型的稳定角色形象描述\",\n    \"判断依据\": [\"\
            依据1\", \"依据2\"]\n  }\n]"
